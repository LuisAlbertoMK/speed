<br>




<div class="card">
    <div class="card-body">
      <div class="row">
        <div class="col-lg-12 col-md-12 col-sm-12 col-12 mb-4 mt-1 text-end">
         
          <button class="btn btn-sm btn-outline-primary m-1" data-bs-toggle="modal" data-bs-target="#PagoGastoModal" 
          (click)="cambia('deposito')" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}">nuevo Deposito</button>

          <button class="btn btn-sm btn-outline-primary m-1" data-bs-toggle="modal" data-bs-target="#PagoGastoModal" 
          (click)="cambia('pago')" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}">nuevo Pago</button>

          <button class="btn btn-sm btn-outline-primary m-1" data-bs-toggle="modal" data-bs-target="#PagoGastoModal" 
          (click)="cambia('gasto')" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}">nuevo Gasto</button>
          
          

          <mat-menu #menuFechas="matMenu">
            <button mat-menu-item *ngFor="let item of fevchas" (click)="valor = item; realizaOp()">{{item}}</button>
            <button mat-menu-item  (click)="valor = 'personalizado'; picker.open();">personalizado</button>
          </mat-menu>
            <div class="row justify-content-end mb-3">
              
              <div class="col-lg-auto col-md-auto col-sm-auto col-auto text-end">
                
                <button class="btn btn-sm btn-outline-success" [matMenuTriggerFor]="menuFechas" [ngStyle]="{'min-width':(miniColumnas)*1.5+'px'}">{{valor}}</button>
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
              </div>
              <div class="col-lg-4 col-md-4 col-sm-6 col-6">
                <mat-form-field appearance="fill">
                  <mat-date-range-picker #picker></mat-date-range-picker>
                  <mat-date-range-input [formGroup]="range_busqueda" [rangePicker]="picker" >
                    <input readonly  matStartDate formControlName="start" (dateChange)="selected()">
                    <input readonly  matEndDate formControlName="end" (dateChange)="selected()">
                  </mat-date-range-input>
                </mat-form-field>
              </div>
            </div>
            <div class="row">
              <ng-container *ngFor="let cam of campos_Reporte">
                  <div class="col-4">
                    <div class="card">
                      <div class="card-body">
                        <h3>{{cam['show']}}</h3>
                        {{reporte[cam['valor']] | monedas}}
                      </div>
                    </div>
                  </div>
              </ng-container>
              
            </div>
            <div class="mat-elevation-z8 table-responsive ">
                <table #GastosDia="matSort" matSort mat-table [dataSource]="dataSourceGastosDia">
                  <ng-container matColumnDef="sucursal">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"
                    (click)="ordenamiento = !ordenamiento; ordenarElementos('Sucursal')"> 
                        <span class="pointer" style="width: 100%;">Sucursal &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-start"> {{element['sucursalShow'] }} </td>
                  </ng-container>
                  <ng-container matColumnDef="concepto">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"
                    (click)="ordenamiento = !ordenamiento; ordenarElementos('concepto')"> 
                        <span class="pointer" style="width: 100%;">Concepto &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-start"> {{element['concepto'] | slice:0:15}}...</td>
                  </ng-container>
                  <ng-container matColumnDef="metodo">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize text-center" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}" (click)="ordenamiento = !ordenamiento; ordenarElementos('metodo')"> 
                        <span class="pointer" style="width: 100%;">metodo &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-center"> {{element['metodoShow'] }}  </td>
                  </ng-container>
                  <ng-container matColumnDef="monto">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize text-center" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}" (click)="ordenamiento = !ordenamiento; ordenarElementos('monto')"> 
                        <span class="pointer" style="width: 100%;">monto &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-center">{{element['monto'] | monedas}}  </td>
                  </ng-container>
                  <ng-container matColumnDef="tipo">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize text-center" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"
                    (click)="ordenamiento = !ordenamiento; ordenarElementos('tipo')"> 
                        <span class="pointer" style="width: 100%;">tipo &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-center text-capitalize"> {{element['tipo'] }}  </td>
                  </ng-container>
                  <ng-container matColumnDef="fecha">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize text-center" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"
                    (click)="ordenamiento = !ordenamiento; ordenarElementos('fecha')"> 
                        <span class="pointer" style="width: 100%;">fecha &nbsp;
                            <ng-container *ngIf="ordenamiento; else elseOrdenamiento">
                              <i class="fa fa-arrow-down" aria-hidden="true"></i>
                            </ng-container>
                            <ng-template #elseOrdenamiento>
                              <i class="fa fa-arrow-up" aria-hidden="true"></i>
                            </ng-template>
                          </span>
                    </th>
                    <td mat-cell *matCellDef="let element" class="text-center text-capitalize"> {{element['fecha'] }}  </td>
                  </ng-container>
                  <ng-container matColumnDef="opciones">
                    <th mat-header-cell *matHeaderCellDef class="text-capitalize text-center" [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"> opciones </th>
                    <td mat-cell *matCellDef="let element" class="text-center">
                      <!-- <ng-container *ngIf="SearchDia === 'hoy'; else elseTemplate">
                        <ng-container *ngIf="element['tipo'] !='Anterior'; else elseTemplate">
                          <i class="fa fa-edit text-primary fa-1x m-1 pointer" (click)="editarGasto(element);" data-bs-toggle="modal" data-bs-target="#RegistroGasto" ></i>
                        <i class="fa fa-trash text-danger fa-1x m-1 pointer" (click)="editarStatus(element, false)" *ngIf="element['status']"></i>
                        </ng-container>
                        <ng-template #elseTemplate>
                        </ng-template>
                        <i class="fa fa-check-double text-success fa-1x m-1 pointer" (click)="editarStatus(element, true)" *ngIf="!element['status']"></i>
                      </ng-container>
                      <ng-template #elseTemplate>
                         <i class="fa fa-check-double text-success fa-1x m-1" ></i>
                      </ng-template> -->
                      
                      
                    </td>
                  </ng-container>
        
                  <!-- Expanded Content Column - The detail row is made up of this one column that spans across all columns -->
                  
                  <tr mat-header-row *matHeaderRowDef="columnasGastosDia"></tr>
                  <tr mat-row *matRowDef="let row; columns: columnasGastosDia;" class="anima" (dblclick)="detalles(row)" ></tr>
                  <!-- <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr> -->
                </table>
                <mat-paginator #GastosDiaPaginator role="group" [pageSizeOptions]="[10, 20, 50, 100]"></mat-paginator>
              </div>
        </div>
      </div>
    </div>
  </div>
  

  <div class="modal fade" id="PagoGastoModal" data-bs-backdrop="static" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-fullscreen modal-fullscreen-sm-down modal-fullscreen-md-down modal-fullscreen-lg-down modal-fullscreen-xl-down modal-fullscreen-xxl-down">
      <div class="modal-content">
        <div class="modal-body">
          <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
              <ng-container *ngIf="muestraForms['pago']">
                <app-pago (showPagoHide)="cambia('pago')"></app-pago>
              </ng-container>
              <ng-container *ngIf="muestraForms['gasto']">
                <app-gasto (showPagoHide)="cambia('gasto')"></app-gasto>
              </ng-container>
              <ng-container *ngIf="muestraForms['deposito']">
                <app-realiza-deposito></app-realiza-deposito>
              </ng-container>
          </div>
          </div>
        </div>
      </div>
    </div>
  </div>
