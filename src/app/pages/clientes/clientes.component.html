<div class="content-header">
  <div class="container-fluid">
    <div class="row">
      <div class="col">
        <ol class="breadcrumb float-sm-right">
          <li class="breadcrumb-item"><a class="breadcrumb-item" [routerLink]="['/inicio']">Inicio</a></li>
          <li class="breadcrumb-item active">Clientes y Vehículos</li>
        </ol>
      </div>
    </div>
  </div>
</div>
<div class="row">
  <div class="col-lg-12 col-md-12 col-sm-12 col-12 text-end">
    <button class="btn btn-sm btn-primary m-1" data-bs-toggle="modal" data-bs-target="#modalNewUser" (click)="cargaDataCliente('')">
      <i class="fa fa-user-plus"></i>
    </button>
    <button class="btn btn-sm btn-warning m-1" data-bs-toggle="modal" data-bs-target="#modalNewVehiculo" (click)="cargaDataVehiculo('','cliente')">
      <i class="fa fa-car"></i>
    </button>
    <button class="btn btn-sm btn-secondary m-1"><i class="fa fa-filter"></i></button>
  </div>
  <div class="col-lg-12 col-md-12 col-sm-12 col-12">
    <mat-form-field>
      <mat-label>Filter</mat-label>
      <input matInput (keyup)="applyFilter($event)" placeholder="Ex. Mia" #input>
    </mat-form-field>
  </div>
</div>

<div class="mat-elevation-z8 table-responsive">
  <table #clientes="matSort" mat-table [dataSource]="dataSourceClientes" matSort multiTemplateDataRows>

    <!-- ID Column -->
    <ng-container matColumnDef="no_cliente">
      <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="{'min-width':(miniColumnas)*1.5+'px'}"> No. Cliente </th>
      <td mat-cell *matCellDef="let row"> {{row.no_cliente}} </td>
    </ng-container>

    <!-- Progress Column -->
    <ng-container matColumnDef="fullname">
      <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="{'min-width':(miniColumnas)*2+'px'}"> Nombre </th>
      <td mat-cell *matCellDef="let row"> {{row.fullname}} </td>
    </ng-container>
    <!-- Progress Column -->
    <ng-container matColumnDef="tipo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="{'min-width':(miniColumnas)*1+'px'}"> Tipo </th>
      <td mat-cell *matCellDef="let row"> {{row.tipo}} </td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="correo">
      <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="{'min-width':(miniColumnas)*1.5+'px'}"> Correo </th>
      <td mat-cell *matCellDef="let row"> {{row.correo}} </td>
    </ng-container>
    <!-- Name Column -->
    <ng-container matColumnDef="opciones">
      <th mat-header-cell *matHeaderCellDef mat-sort-header [ngStyle]="{'min-width':(miniColumnas)*1+'px'}">  </th>
      <td mat-cell *matCellDef="let row"> 
        <i class="fa fa-edit text-primary m-1 pointer" #tooltip="matTooltip" matTooltip="Editar informacion"
        (click)="cargaDataCliente(row)" data-bs-toggle="modal" data-bs-target="#modalNewUser"></i>  
        <i class="fa fa-car text-primary m-1 pointer" #tooltip="matTooltip" matTooltip="Nuevo vehiculo"
        (click)="cargaDataVehiculo(row,'cliente')" data-bs-toggle="modal"
                          data-bs-target="#modalNewVehiculo"></i>  
        <!-- <i class="fa fa-books text-danger m-1 pointer" #tooltip="matTooltip" matTooltip="Historial de cliente"></i>   -->
        <i class="fa fa-calculator text-success m-1 pointer" #tooltip="matTooltip" matTooltip="Realizar cotizacion"
        [routerLink]="'/cotizacionNueva/'+row.id+'/cliente'" ></i>  
        <i class="fa fa-car-garage text-danger m-1 pointer" #tooltip="matTooltip" matTooltip="Realizar recepcion"
        [routerLink]="'/ServiciosConfirmar/'+row.id+'/cliente'"></i>  
      </td>
    </ng-container>
    <ng-container matColumnDef="expand">
      <th mat-header-cell *matHeaderCellDef aria-label="row actions">&nbsp;</th>
      <td mat-cell *matCellDef="let element">
        <button mat-icon-button aria-label="expand row" (click)="(expandedElement = expandedElement === element ? null : element); $event.stopPropagation()">
          <mat-icon *ngIf="expandedElement !== element">keyboard_arrow_down</mat-icon>
          <mat-icon *ngIf="expandedElement === element">keyboard_arrow_up</mat-icon>
        </button>
      </td>
    </ng-container>
    <!-- Expanded Content Column - The detail row is made up of this one column that spans across all columns -->
  <ng-container matColumnDef="expandedDetail">
    <td mat-cell *matCellDef="let element" [attr.colspan]="columnsToDisplayWithExpand.length ">
      <div class="example-element-detail"
           [@detailExpand]="element == expandedElement ? 'expanded' : 'collapsed'">
           <!-- <div class="example-element-description"> -->
            <div class="row">
              <div class="col-lg-12 col-md-12 col-sm-12 col-12">
                <!-- aqui lista de vehiculos -->
                <div class="table-responsive">
                  <table class="table">
                    <thead>
                      <tr>
                        <th scope="col">#</th>
                        <th scope="col">Placas</th>
                        <th scope="col">Marca</th>
                        <th scope="col">Modelo</th>
                        <th scope="col">Color</th>
                        <th scope="col">anio</th>
                        <th scope="col">engomado</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr *ngFor="let v of element.vehiculos; let i = index">
                        <th scope="row">{{ i + 1 }}</th>
                        <td>{{v.placas}}</td>
                        <td>{{v.marca}}</td>
                        <td>{{v.modelo}}</td>
                        <td>{{v.color}}</td>
                        <td>{{v.anio}}</td>
                        <td>{{v.engomado}}</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
           <!-- </div> -->
       
      </div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columnsToDisplayWithExpand"></tr>
  <tr mat-row *matRowDef="let element; columns: columnsToDisplayWithExpand;"
      class="example-element-row"
      [class.example-expanded-row]="expandedElement === element"
      (click)="expandedElement = expandedElement === element ? null : element">
  </tr>
  <tr mat-row *matRowDef="let row; columns: ['expandedDetail']" class="example-detail-row"></tr>
  </table>
  <mat-paginator #clientesPaginator [pageSizeOptions]="[10, 25, 100]" aria-label="Select page of users"></mat-paginator>
</div>


<!-- aqui las ventanas modal para el registro de nuevo cliente o vehiculo -->

  <div class="modal fade" id="modalNewUser" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
  aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div
    class="modal-dialog modal-xl modal-fullscreen modal-fullscreen-sm-down modal-fullscreen-md-down modal-fullscreen-lg-down modal-fullscreen-xl-down modal-fullscreen-xxl-down modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-body">
        <div class="row">
          <div class="col text-end">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
        </div>
        <ng-container *ngIf="datCliente; else elseNewCliente">
          <app-cliente [data]="datCliente" [id]="datCliente.id" (heroeSlec)="clientesInfo( $event )" [sucursal]="SUCURSAL"></app-cliente>
        </ng-container>
        <ng-template #elseNewCliente>
          <div class="row">
            <div class="col text-center">
              <app-cliente (heroeSlec)="clientesInfo( $event )" [sucursal]="SUCURSAL"></app-cliente>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalNewVehiculo" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1"
  aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div
    class="modal-dialog modal-xl modal-fullscreen modal-fullscreen-sm-down modal-fullscreen-md-down modal-fullscreen-lg-down modal-fullscreen-xl-down modal-fullscreen-xxl-down modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-body m-2">
        <div class="row">
          <div class="col-lg-12 col-md-12 col-sm-12 col-12 text-end">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" (click)="cargaDataCliente('')"></button>
          </div>
        </div>
        <ng-container *ngIf="cliente; else elseVehiculo">
          <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
              <app-vehiculo [cliente]="cliente" (dataVehiculo)="vehiculoInfo( $event )" ></app-vehiculo>
            </div>
          </div>
        </ng-container>
        <ng-template #elseVehiculo>
          <div class="row">
            <div class="col-lg-12 col-md-12 col-sm-12 col-12">
              <ng-container *ngIf="vehiculo; else elseIDvehiculo">
                <app-vehiculo [vehiculo]="vehiculo['id']" [vehiculoDat]="vehiculo" [cliente]="vehiculo['cliente']" (dataVehiculo)="vehiculoInfo( $event )" ></app-vehiculo>
              </ng-container>
              <ng-template #elseIDvehiculo>
                <app-vehiculo  (dataVehiculo)="vehiculoInfo( $event )" ></app-vehiculo>
              </ng-template>
            </div>
          </div>
        </ng-template>
      </div>
    </div>
  </div>
</div>
