<div class="card text-left">
    <div class="card-body">
        <div class="col text-center">
            <h2 class="text-primary">
                <strong>Formulario de complementos</strong>
            </h2>
        </div>
        <!-- {{FormComplementos.value | json }} -->
        <form  [formGroup]="FormComplementos" class="m-2">
            <div class="row">
                <div class="col-lg-6 col-md-6 col-sm-12 col-12 text-start">
                    <div class="row">
                        <div class="col-lg-6 col-md-12 col-sm-12 col-12 text-start">
                            <div class="mb-1 row">
                                <label
                                    [ngClass]="{'text-danger': validaCampo('kilometraje'),'text-success': !validaCampo('kilometraje')}"
                                    for="kilometraje"
                                    class="col-sm-4 col-md-6 col-lg-6 col-12 col-form-label">Kilometraje
                                </label>
                                <div class="col-sm-8 col-md-6 col-lg-6 col-12">
                                    <input
                                        id="kilometraje"
                                        type="number"
                                        min="0"
                                        max="10000000"
                                        class="form-control form-control-sm"
                                        formControlName="kilometraje"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-12 col-12 text-start">
                        <div class="row">
                            <div class="col-lg-6 col-md-12 col-sm-12 col-12 text-start">
                                <div class="mb-1 row">
                                    <label
                                        [ngClass]="{'text-danger': validaCampo('facturaRemision'),'text-success': !validaCampo('facturaRemision')}"
                                        for="facturaRemision"
                                        class="col-sm-4 col-md-6 col-lg-6 col-12 col-form-label">Factura / remision
                                    </label>
                                    <div class="col-sm-8 col-md-6 col-lg-6 col-12">
                                        <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" formControlName="facturaRemision"  id="inlineRadio1" value="remision">
                                            <label class="form-check-label" for="inlineRadio1" >Remison</label>
                                          </div>
                                          <div class="form-check form-check-inline">
                                            <input class="form-check-input" type="radio" formControlName="facturaRemision"  id="inlineRadio2" value="factura">
                                            <label class="form-check-label" for="inlineRadio2" >Factura</label>
                                          </div>
                                        </div>
                                    </div>
                                </div>
                        </div>
                    </div>
                    <div class="col-lg-6 col-md-6 col-sm-12 col-12 text-start">
                        <div class="row">
                            <div class="col-lg-6 col-md-12 col-sm-12 col-12 text-start">
                                <div class="mb-1 row">
                                    <label
                                        [ngClass]="{'text-danger': validaCampo('formaPago'),'text-success': !validaCampo('formaPago')}"
                                        for="formaPago"
                                        class="col-sm-4 col-md-6 col-lg-6 col-12 col-form-label">Forma de pago
                                    </label>
                                    <div class="col-sm-8 col-md-6 col-lg-6 col-12">
                                        <select class="form-select form-select-sm" formControlName="formaPago">
                                            <option [value]="metodo['metodo']" *ngFor="let metodo of metodospago">{{metodo['show']}}</option>
                                        </select>
                                    </div>
                                    </div>
                                </div>
                        </div>
                    </div>
                </div>
        </form>
        <div class="col-12 text-center" style="font-size: 11;" >
            <canvas #firmaDigital id="main-canvas" class="fluid" style="touch-action:none;" ></canvas>
            <br>
            <h3 class="fw-bolder">Firma de cliente</h3>
            <!-- <button class="btn btn-danger m-1 " (click)="limpiarFirma()">Limpiar Firma</button>
            <button class="btn btn-primary m-1 " (click)="firmar()">Firmar recepción</button> -->
            
            <!-- <button class="btn btn-danger m-1 " (click)="subirFirma()">subirFirma</button> -->
          </div>
          <ng-container *ngIf="!existe_data_facturacion">
            <div class="row">
                <div class="col-lg-12 col-md-12 col-sm-12 col-12 text-center">
                    <h4 class="text-danger">El cliente no cuenta con datos de facturacion para editar su informacion presiona el boton de abajo </h4>
                    <button class="btb btn-primary btn-sm">Editar</button>
                </div>
            </div>
        </ng-container>
        
        
        <button class="btn btn-sm btn-primary" (click)="validarTipo()">Entregar vehiculo</button>

        </div>
        <div>

        </div>
