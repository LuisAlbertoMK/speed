<div class="row mt-5 mb-5 ml-3 mr-3 ">
    <div class="card col-lg-10 col-md-10 col-sm-12 offset-lg-1 offset-md-1 sombra mt-4">
      <div class="card-body ">
        <div class="row">
          <div class="col-lg-6 col-md-6 col-sm-6">
            <img src="assets/logoSpeedPro/logoSpeedBig.png" id="logo" class="img-fluid rounded-start" alt="..."  >
          </div>
          <div class="col-lg-6 col-md-6 col-sm-6">
            <div class="example-container">
                <div class="col-12 text-center">
                   <h2 class="">Acceso <strong>SpeedPro Server</strong></h2>
                </div>
              <form (ngSubmit)="login(f)" #f="ngForm">
                <p>
                  <mat-form-field appearance="fill" class="col-12">
                    <mat-label>Ingresa Email *</mat-label>
                    <input matInput name="email" [(ngModel)]="usuario.email">
                  </mat-form-field>
                </p>
                <p>
                  <mat-form-field appearance="fill" class="col-12">
                      <mat-label>Ingresa contraseña *</mat-label>
                      <input matInput [type]="hide ? 'password' : 'text'" name="password" [(ngModel)]="usuario.password">
                      <a mat-icon-button matSuffix (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                        <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
                      </a>
                    </mat-form-field>
                  
                </p>
                <section class="example-section text-end">
                  <a href="#" class="link">Olvide mi contraseña</a>
                </section>
                <section class="example-section">
                  <mat-checkbox class="example-margin" name="recordarme" [(ngModel)]="recordarme">Recuerdame</mat-checkbox>
                </section>
                <div class="text-center">
                    <button class="btn btn-outline-primary text-uppercase" [ngClass]="{'disabled': bloquea}"> iniciar sesión</button>
                </div>
              </form>
            </div>
  
          </div>
        </div>
      </div>
    </div>
  
  </div>
