<div class="card text-left">
  <div class="card-body">
    <div class="col text-center">
      <h2 class="text-primary"><strong>Registro de Pago</strong></h2>
    </div>
    <form (ngSubmit)="registroPago()" [formGroup]="formPago" class="m-2">
      <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-12 col-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('no_os'),'text-success': !validaCampo('no_os')}" for="no_os"
              class="col-sm-6 col-md-6 col-lg-6 col-12 col-form-label"># O.S  [ ordenes: {{ ordenes.length }} ]</label>
            <div class="col-sm-6 col-md-6 col-lg-6 col-12">
              <select id="sucursal" class="form-select form-select-sm" formControlName="no_os">
                <option value="">Selecciona</option>
                <option [value]="s.id" *ngFor="let s of ordenes">
                  {{s['no_os']}}
                </option>
              </select>
            </div>
          </div>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12 col-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('monto'),'text-success': !validaCampo('monto')}" for="monto"
              class="col-sm-6 col-md-6 col-lg-6 col-12 col-form-label">Monto de pago </label>
            <div class="col-sm-6 col-md-6 col-lg-6 col-12">
              <input id="monto" type="number" min="0" max="10000000" class="form-control form-control-sm"
                formControlName="monto">
            </div>
          </div>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12 col-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('metodo'),'text-success': !validaCampo('metodo')}"
              for="metodo" class="col-sm-6 col-md-6 col-lg-6 col-12 col-form-label">Método de pago </label>
            <div class="col-sm-6 col-md-6 col-lg-6 col-12">
              <select id="metodo" class="form-select form-select-sm" formControlName="metodo">
                <option value="">Selecciona</option>
                <option [value]="pago.metodo" *ngFor="let pago of metodospago">
                  {{pago.show}}
                </option>
              </select>
            </div>
          </div>
        </div>
        <ng-container *ngIf="sucursal ==='Todas'">
          <div class="col-lg-6 col-md-6 col-sm-12 col-12">
            <div class="mb-1 row">
              <label [ngClass]="{'text-danger': validaCampo('sucursal'),'text-success': !validaCampo('sucursal')}"
                for="sucursal" class="col-sm-6 col-md-6 col-lg-6 col-12 col-form-label">Sucursal</label>
              <div class="col-sm-6 col-md-6 col-lg-6 col-12">
                <select id="sucursal" class="form-select form-select-sm" formControlName="sucursal">
                  <option value="">Selecciona</option>
                  <option [value]="s.id" *ngFor="let s of Sucursales">
                    {{s.sucursal}}
                  </option>
                </select>
              </div>
            </div>
          </div>
        </ng-container>
        <div class="col-lg-6 col-md-6 col-sm-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('concepto'),'text-success': !validaCampo('concepto')}"
              for="concepto" class="col-sm-3 col-md-4 col-lg-3 col-form-label">Concepto </label>
            <div class="col-sm-9 col-md-8 col-lg-9">
              <textarea style="width: 100%" formControlName="concepto" id="concepto"></textarea>
            </div>
          </div>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('referencia'),'text-success': !validaCampo('referencia')}"
              for="referencia" class="col-sm-3 col-md-4 col-lg-3 col-form-label">Referecnia </label>
            <div class="col-sm-9 col-md-8 col-lg-9">
              <textarea style="width: 100%" formControlName="referencia" id="referencia"></textarea>
            </div>
          </div>
        </div>
        <div class="col-lg-6 col-md-6 col-sm-12">
          <div class="mb-1 row">
            <label [ngClass]="{'text-danger': validaCampo('fecha'),'text-success': !validaCampo('fecha')}"
              class="col-sm-3 col-md-4 col-lg-3 col-form-label">Fecha </label>
            <div class="col-sm-9 col-md-8 col-lg-9">
                <div class="input-group mb-3">
                   <mat-datepicker-toggle class="btn" matIconSuffix [for]="picker"></mat-datepicker-toggle>
                    <input matInput [matDatepicker]="picker" type="text" (dateInput)="addEvent('input', $event)"
                    (dateChange)="addEvent('change', $event)" class="form-control form-control-sm">
                    <mat-datepicker #picker disabled="false"></mat-datepicker>
                  </div>
            </div> 
          </div>
        </div>
        <div class="col-lg-12 col-md-12 col-sm-12 col-12 text-center">
          <button type="submit" [ngStyle]="{'min-width':(miniColumnas)*1.5+'px'}"
            class="btn btn-sm btn-primary m-1">Registrar pago</button>
          <button type="button" [ngStyle]="{'min-width':(miniColumnas)*1.5+'px'}"
            class="btn btn-sm btn-danger m-1" (click)="cancela()">Cancelar</button>
        </div>
      </div>
    </form>
    <ng-container *ngIf="informacionFaltante">
      <div class="col text-center">
        <p>Falta información: <strong class="text-danger">{{informacionFaltante}}</strong></p>
      </div>
    </ng-container>
    <!-- <pre>Formulario valido: {{formPago.valid }}</pre>
    <pre>{{formPago.value |json}}</pre> -->
  </div>
